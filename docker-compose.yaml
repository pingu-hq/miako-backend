
services:
  my-app:
    build: .
    image: miako-pingu-backend
    container_name: miako-pingu-backend-cont
    #restart: unless-stopped
    ports:
      - "8000:8000"

    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - miako-network

  db:
    image: postgres:15-alpine
    container_name: miako-pingu-database-cont
    restart: unless-stopped
    # Postgres also needs credentials from the .env file
    env_file:
      - .env
    environment:
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - miako-network
    # No ports exposed to host for security

volumes:
  postgres_data:

networks:
  miako-network:
    driver: bridge
